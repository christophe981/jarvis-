document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;line-height:1.7;color:#4F5963;margin-bottom:18px\">Je m'appelle <strong style=\"color:#18222E\">Christophe Lachaud<\u002Fstrong>, j'ai 47 ans et je suis installé à Périgueux, en Dordogne. Avant de devenir OBM, j'ai passé quinze ans à piloter des projets concrets : VRD, bâtiment, génie civil, fonction publique.<\u002Fp>\n        <p style=\"font-size:17.5px;line-height:1.7;color:#4F5963;margin-bottom:30px\">Des chantiers où l'on ne peut pas se permettre l'à-peu-près. On y apprend la rigueur, la coordination et le sens du résultat — et surtout à gérer des humains et des imprévus en même temps. C'est exactement ce que j'apporte aux dirigeants et créateurs qui veulent reprendre la main sur leurs opérations.<\u002Fp>\n        <div style=\"border-left:3px solid #E8804A;padding:6px 0 6px 22px;margin-bottom:34px\">\n          <p style=\"font-family:'Newsreader',serif;font-style:italic;font-size:23px;line-height:1.5;color:#18222E\">« Je ne viens pas vous vendre une méthode toute faite. Je viens comprendre votre réalité, puis l'organiser. »<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px solid #DDD4C8;padding-top:26px\">\n          <div><div style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:30px;color:#18222E;line-height:1\">15 ans<\u002Fdiv><div style=\"font-size:13.5px;color:#7B848E;margin-top:4px\">d'expérience terrain<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:30px;color:#18222E;line-height:1\">24 h<\u002Fdiv><div style=\"font-size:13.5px;color:#7B848E;margin-top:4px\">délai de réponse<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:30px;color:#18222E;line-height:1\">100 %<\u002Fdiv><div style=\"font-size:13.5px;color:#7B848E;margin-top:4px\">sur-mesure<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SERVICES ============ -->\n  <section id=\"services\" style=\"background:#fff;padding:108px 0;scroll-margin-top:74px\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 32px\">\n      <div data-reveal=\"\" style=\"max-width:720px;margin-bottom:54px\">\n        <div style=\"font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#E8804A;margin-bottom:18px\">Mes services<\u002Fdiv>\n        <h2 style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:44px;line-height:1.08;letter-spacing:-.02em;color:#18222E;margin-bottom:18px\">Quatre façons de reprendre la main.<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.6;color:#5C6772\">À la carte ou en accompagnement régulier. On part toujours de votre besoin réel, jamais d'une offre standard.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:24px\" data-serv-grid=\"\">\n\n        <div data-reveal=\"\" style=\"background:#F6F3EE;border:1px solid #ECE5DB;border-radius:20px;padding:36px;display:flex;flex-direction:column\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px\">\n            <span style=\"width:50px;height:50px;border-radius:13px;background:#0C1E33;display:flex;align-items:center;justify-content:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E8804A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M8 4v16M8 9h13M8 14h13\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:15px;color:#D8CFC2\">01<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:23px;color:#18222E;margin-bottom:10px\">Gestion de projets &amp; d'opérations<\u002Fh3>\n          <p style=\"font-size:16px;line-height:1.6;color:#5C6772;margin-bottom:22px\">Je pilote vos projets de A à Z : planning, jalons, points d'avancement et gestion des imprévus.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:auto\">\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Cadrage &amp; rétroplanning<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Suivi des échéances<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Gestion des risques<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Reporting régulier<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-reveal=\"\" style=\"background:#F6F3EE;border:1px solid #ECE5DB;border-radius:20px;padding:36px;display:flex;flex-direction:column\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px\">\n            <span style=\"width:50px;height:50px;border-radius:13px;background:#0C1E33;display:flex;align-items:center;justify-content:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E8804A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14.5 5.5a3.5 3.5 0 0 0-5 4.6l-6 6a2 2 0 0 0 2.8 2.8l6-6a3.5 3.5 0 0 0 4.6-5l-2.2 2.2-2-2 2-2.4z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:15px;color:#D8CFC2\">02<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:23px;color:#18222E;margin-bottom:10px\">Outils &amp; systèmes<\u002Fh3>\n          <p style=\"font-size:16px;line-height:1.6;color:#5C6772;margin-bottom:22px\">Je mets en place et je fais vivre les outils qui simplifient votre quotidien, sans usine à gaz.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:auto\">\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Notion · Trello · Airtable<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Tableaux de bord<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Automatisations simples<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Formation de l'équipe<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-reveal=\"\" style=\"background:#F6F3EE;border:1px solid #ECE5DB;border-radius:20px;padding:36px;display:flex;flex-direction:column\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px\">\n            <span style=\"width:50px;height:50px;border-radius:13px;background:#0C1E33;display:flex;align-items:center;justify-content:center\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E8804A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"6\" cy=\"6\" r=\"2.4\"><\u002Fcircle><circle cx=\"6\" cy=\"18\" r=\"2.4\"><\u002Fcircle><circle cx=\"18\" cy=\"12\" r=\"2.4\"><\u002Fcircle><path d=\"M8.4 6H14a2 2 0 0 1 2 2v1.8M8.4 18H14a2 2 0 0 0 2-2v-1.8\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span style=\"font-family:'Schibsted Grotesk';font-weig ont-weight:800;font-size:15px;color:#D8CFC2\">04<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:23px;color:#18222E;margin-bottom:10px\">Suivi, reporting &amp; coordination<\u002Fh3>\n          <p style=\"font-size:16px;line-height:1.6;color:#5C6772;margin-bottom:22px\">Je fais le lien entre vos équipes, prestataires et partenaires — et je vous tiens informé sans vous noyer.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:auto\">\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Coordination d'équipes<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Suivi des prestataires<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Reporting dirigeant<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#0C1E33;background:#fff;border:1px solid #E3DACE;border-radius:100px;padding:7px 13px\">Point hebdo<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TÉMOIGNAGES ============ -->\n  <section id=\"temoignages\" style=\"background:#F6F3EE;padding:108px 0;scroll-margin-top:74px\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 32px\">\n      <div data-reveal=\"\" style=\"max-width:720px;margin-bottom:48px\">\n        <div style=\"font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#E8804A;margin-bottom:18px\">Ils m'ont fait confiance<\u002Fdiv>\n        <h2 style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:44px;line-height:1.08;letter-spacing:-.02em;color:#18222E;margin-bottom:18px\">Bientôt, votre retour ici.<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.6;color:#5C6772\">Ces emplacements accueilleront les témoignages de mes premiers clients. À remplir au fil des collaborations.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px\" data-temo-grid=\"\">\n        <div data-reveal=\"\" style=\"background:#fff;border:1px dashed #D5CABB;border-radius:18px;padding:30px;display:flex;flex-direction:column;min-height:268px\">\n          <div style=\"font-family:'Newsreader',serif;font-size:48px;line-height:.7;color:#E8C9B2\">“<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.6;color:#A9A294;font-style:italic;margin:14px 0 auto\">Emplacement réservé au témoignage d'un client. Citez ici un résultat concret et mesurable obtenu ensemble.<\u002Fp>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid #EFE8DD\">\n            <span style=\"width:42px;height:42px;border-radius:50%;background:#EFE7DB\"><\u002Fspan>\n            <span><span style=\"display:block;font-weight:700;font-size:14px;color:#9AA095\">Prénom Nom<\u002Fspan><span style=\"font-size:13px;color:#B6AE9F\">Fonction · Entreprise<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff;border:1px dashed #D5CABB;border-radius:18px;padding:30px;display:flex;flex-direction:column;min-height:268px\">\n          <div style=\"font-family:'Newsreader',serif;font-size:48px;line-height:.7;color:#E8C9B2\">“<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.6;color:#A9A294;font-style:italic;margin:14px 0 auto\">Emplacement réservé au témoignage d'un client. Décrivez le « avant / après » de votre organisation.<\u002Fp>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid #EFE8DD\">\n            <span style=\"width:42px;height:42px;border-radius:50%;background:#EFE7DB\"><\u002Fspan>\n            <span><span style=\"display:block;font-weight:700;font-size:14px;color:#9AA095\">Prénom Nom<\u002Fspan><span style=\"font-size:13px;color:#B6AE9F\">Fonction · Entreprise<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff;border:1px dashed #D5CABB;border-radius:18px;padding:30px;display:flex;flex-direction:column;min-height:268px\">\n          <div style=\"font-family:'Newsreader',serif;font-size:48px;line-height:.7;color:#E8C9B2\">“<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.6;color:#A9A294;font-style:italic;margin:14px 0 auto\">Emplacement réservé au témoignage d'un client. Mentionnez ce qui vous a donné confiance dès le départ.<\u002Fp>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid #EFE8DD\">\n            <span style=\"width:42px;height:42px;border-radius:50%;background:#EFE7DB\"><\u002Fspan>\n            <span><span style=\"display:block;font-weight:700;font-size:14px;color:#9AA095\">Prénom Nom<\u002Fspan><span style=\"font-size:13px;color:#B6AE9F\">Fonction · Entreprise<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FAQ ============ -->\n  <section id=\"faq\" style=\"background:#fff;padding:108px 0;scroll-margin-top:74px\">\n    <div style=\"max-width:920px;margin:0 auto;padding:0 32px\">\n      <div data-reveal=\"\" style=\"margin-bottom:46px\">\n        <div style=\"font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#E8804A;margin-bottom:18px\">Questions fréquentes<\u002Fdiv>\n        <h2 style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:44px;line-height:1.08;letter-spacing:-.02em;color:#18222E\">Tout ce que vous vous demandez.<\u002Fh2>\n      <\u002Fdiv>\n      <div data-reveal=\"\">\n        <sc-for list=\"{{ faqs }}\" as=\"item\" hint-placeholder-count=\"5\">\n          <div style=\"border-bottom:1px solid #ECE5DB\">\n            <button onclick=\"{{ item.onToggle }}\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;gap:24px;padding:26px 0;background:none;border:none;cursor:pointer;text-align:left\">\n              <span style=\"font-family:'Schibsted Grotesk';font-weight:600;font-size:20px;color:#18222E\">{{ item.q }}<\u002Fspan>\n              <span style=\"flex:none;width:34px;height:34px;border-radius:50%;background:#F6F3EE;display:flex;align-items:center;justify-content:center;font-size:22px;color:#E8804A;transition:transform .3s ease;transform:{{ item.iconTransform }}\">+<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ item.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:0 0 28px;max-width:760px;font-size:17px;line-height:1.7;color:#5C6772\">{{ item.a }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CONTACT / CTA ============ -->\n  <section id=\"contact\" style=\"background:#0C1E33;color:#fff;padding:108px 0;scroll-margin-top:74px;position:relative;overflow:hidden\">\n    <div style=\"position:absolute;top:-140px;left:50%;transform:translateX(-50%);width:760px;height:420px;background:radial-gradient(circle,rgba(232,128,74,.22),transparent 60%);pointer-events:none\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1080px;margin:0 auto;padding:0 32px;display:grid;grid-template-columns:.95fr 1.05fr;gap:60px;align-items:center\" data-contact-grid=\"\">\n      <div data-reveal=\"\">\n        <div style=\"font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#E8804A;margin-bottom:18px\">Parlons-en<\u002Fdiv>\n        <h2 style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:46px;line-height:1.06;letter-spacing:-.02em;margin-bottom:20px\">Parlons de votre situation.<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.6;color:rgba(255,255,255,.74);margin-bottom:34px;max-width:420px\">Un appel de 30 minutes, gratuit et sans engagement. On regarde ensemble où vous en êtes — et si je peux vraiment vous aider.<\u002Fp>\n        <ul style=\"list-style:none;display:flex;flex-direction:column;gap:16px\">\n          <li style=\"display:flex;align-items:center;gap:13px;font-size:16px;color:rgba(255,255,255,.88)\"><span style=\"flex:none;width:24px;height:24px;border-radius:50%;background:rgba(232,128,74,.18);display:flex;align-items:center;justify-content:center\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E8804A\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5 10 17.5 19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan>Gratuit &amp; sans engagement<\u002Fli>\n          <li style=\"display:flex;align-items:center;gap:13px;font-size:16px;color:rgba(255,255,255,.88)\"><span style=\"flex:none;width:24px;height:24px;border-radius:50%;background:rgba(232,128,74,.18);display:flex;align-items:center;justify-content:center\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E8804A\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5 10 17.5 19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan>Réponse sous 24 h<\u002Fli>\n          <li style=\"display:flex;align-items:center;gap:13px;font-size:16px;color:rgba(255,255,255,.88)\"><span style=\"flex:none;width:24px;height:24px;border-radius:50%;background:rgba(232,128,74,.18);display:flex;align-items:center;justify-content:center\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E8804A\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5 10 17.5 19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan>Échange concret, pas de blabla commercial<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#fff;border-radius:22px;padding:36px;box-shadow:0 30px 70px -30px rgba(0,0,0,.6)\">\n        <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:30px 10px\">\n            <div style=\"width:64px;height:64px;border-radius:50%;background:#EAF7EF;display:flex;align-items:center;justify-content:center;margin:0 auto 22px\"><svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2BA866\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5 10 17.5 19 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <h3 style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:26px;color:#18222E;margin-bottom:12px\">Merci, message bien reçu !<\u002Fh3>\n            <p style=\"font-size:16.5px;line-height:1.6;color:#5C6772\">Je vous recontacte sous 24 h pour convenir de notre appel découverte. À très vite.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showForm }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ submit }}\">\n            <div style=\"margin-bottom:18px\">\n              <label style=\"display:block;font-size:13.5px;font-weight:600;color:#3A434D;margin-bottom:8px\">Prénom &amp; nom<\u002Flabel>\n              <input type=\"text\" value=\"{{ prenom }}\" onchange=\"{{ onPrenom }}\" placeholder=\"Marie Dupont\" style=\"width:100%;font-family:'Hanken Grotesk';font-size:16px;color:#18222E;padding:14px 16px;border:1.5px solid #E2DCD2;border-radius:11px;outline:none;background:#FBFAF7\">\n              <sc-if value=\"{{ errPrenom }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:block;font-size:13px;color:#D9533B;margin-top:7px\">Merci d'indiquer votre nom.<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"margin-bottom:18px\">\n              <label style=\"display:block;font-size:13.5px;font-weight:600;color:#3A434D;margin-bottom:8px\">Email<\u002Flabel>\n              <input type=\"email\" value=\"{{ email }}\" onchange=\"{{ onEmail }}\" placeholder=\"marie@monentreprise.fr\" style=\"width:100%;font-family:'Hanken Grotesk';font-size:16px;color:#18222E;padding:14px 16px;border:1.5px solid #E2DCD2;border-radius:11px;outline:none;background:#FBFAF7\">\n              <sc-if value=\"{{ errEmail }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:block;font-size:13px;color:#D9533B;margin-top:7px\">Merci d'indiquer un email valide.<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"margin-bottom:24px\">\n              <label style=\"display:block;font-size:13.5px;font-weight:600;color:#3A434D;margin-bottom:8px\">Votre situation en deux mots<\u002Flabel>\n              <textarea value=\"{{ message }}\" onchange=\"{{ onMessage }}\" rows=\"4\" placeholder=\"Ce qui vous fait perdre du temps en ce moment…\" style=\"width:100%;font-family:'Hanken Grotesk';font-size:16px;color:#18222E;padding:14px 16px;border:1.5px solid #E2DCD2;border-radius:11px;outline:none;background:#FBFAF7;resize:vertical\"><\u002Ftextarea>\n              <sc-if value=\"{{ errMessage }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:block;font-size:13px;color:#D9533B;margin-top:7px\">Dites-moi en quelques mots où vous en êtes.<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <button type=\"submit\" style=\"width:100%;font-family:'Schibsted Grotesk';font-size:16.5px;font-weight:700;color:#0C1E33;background:#E8804A;border:none;padding:16px;border-radius:12px;cursor:pointer;box-shadow:0 12px 26px -12px rgba(232,128,74,.8)\">Envoyer ma demande<\u002Fbutton>\n            <p style=\"text-align:center;font-size:13px;color:#9AA4AF;margin-top:14px\">Ou écrivez-moi directement à <span style=\"color:#18222E;font-weight:600\">contact@christophe-lachaud.fr<\u002Fspan><\u002Fp>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background:#081827;color:rgba(255,255,255,.6);padding:44px 0\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 32px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:18px\">\n      <div style=\"display:flex;align-items:center;gap:12px\">\n        <span style=\"width:34px;height:34px;border-radius:9px;background:#E8804A;display:flex;align-items:center;justify-content:center;font-family:'Schibsted Grotesk';font-weight:800;font-size:14px;color:#0C1E33\">CL<\u002Fspan>\n        <span style=\"font-size:14.5px;color:rgba(255,255,255,.8)\"><strong style=\"color:#fff;font-weight:700\">Christophe Lachaud<\u002Fstrong> — Online Business Manager<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:14px;display:flex;flex-wrap:wrap;gap:8px 22px\">\n        <span>Périgueux (24) · partout en France<\u002Fspan>\n        <span style=\"color:rgba(255,255,255,.3)\">·<\u002Fspan>\n        <span>contact@christophe-lachaud.fr<\u002Fspan>\n        <span style=\"color:rgba(255,255,255,.3)\">·<\u002Fspan>\n        <span>© 2026<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.state = {\n      navOpen:false, openFaq:0,\n      prenom:'', email:'', message:'',\n      errPrenom:false, errEmail:false, errMessage:false,\n      sent:false\n    };\n    this._faqData = [\n      { q:\"Combien ça coûte ?\", a:\"Chaque accompagnement est sur-mesure. On part de votre besoin réel — un coup de main ponctuel sur un projet, ou un suivi régulier au mois. Je vous fais une proposition claire et chiffrée après notre appel, sans surprise ni frais cachés.\" },\n      { q:\"Comment se passe une collaboration ?\", a:\"On démarre par un appel découverte gratuit pour comprendre votre situation. Je vous propose ensuite un plan d'action priorisé, puis je prends en charge l'exécution et le suivi. Vous gardez la visibilité, je gère le quotidien.\" },\n      { q:\"En combien de temps voit-on des résultats ?\", a:\"Les premiers gains de clarté arrivent dès les deux premières semaines : vos projets sont cadrés, vos outils rangés, vos priorités visibles. Les effets de fond s'installent sur le premier ou deuxième mois.\" },\n      { q:\"Y a-t-il un engagement de durée ?\", a:\"Non. On peut travailler au projet ou au forfait mensuel, sans engagement long. L'idée, c'est que vous restiez parce que ça vous fait gagner du temps — pas à cause d'un contrat.\" },\n      { q:\"Vous travaillez à distance ou sur place ?\", a:\"Les deux. Basé à Périgueux, je me déplace volontiers en Dordogne et alentours pour les temps forts. Le reste se gère très bien à distance, avec des points réguliers et des outils partagés.\" }\n    ];\n  }\n\n  componentDidMount(){\n    try{\n      const root = this.rootRef.current || document;\n      const nodes = root.querySelectorAll('[data-reveal]');\n      if(!('IntersectionObserver' in window)){\n        nodes.forEach(n=>n.setAttribute('data-reveal-in',''));\n        return;\n      }\n      const io = new IntersectionObserver((entries)=>{\n        entries.forEach(en=>{\n          if(en.isIntersecting){ en.target.setAttribute('data-reveal-in',''); io.unobserve(en.target); }\n        });\n      }, { threshold:0.12, rootMargin:'0px 0px -8% 0px' });\n      nodes.forEach(n=>io.observe(n));\n      // safety fallback\n      this._revealTimer = setTimeout(()=>nodes.forEach(n=>n.setAttribute('data-reveal-in','')), 2500);\n    }catch(e){\n      const root = this.rootRef.current || document;\n      root.querySelectorAll('[data-reveal]').forEach(n=>n.setAttribute('data-reveal-in',''));\n    }\n  }\n\n  componentWillUnmount(){ if(this._revealTimer) clearTimeout(this._revealTimer); }\n\n  toggleNav(){ this.setState(s=>({navOpen:!s.navOpen})); }\n  closeNav(){ this.setState({navOpen:false}); }\n  toggleFaq(i){ this.setState(s=>({openFaq: s.openFaq===i ? -1 : i})); }\n\n  submit(e){\n    e.preventDefault();\n    const errPrenom = !this.state.prenom.trim();\n    const errEmail = !/^\\S+@\\S+\\.\\S+$/.test(this.state.email.trim());\n    const errMessage = !this.state.message.trim();\n    if(errPrenom || errEmail || errMessage){\n      this.setState({ errPrenom, errEmail, errMessage });\n      return;\n    }\n    this.setState({ errPrenom:false, errEmail:false, errMessage:false, sent:true });\n  }\n\n  renderVals(){\n    const faqs = this._faqData.map((f,i)=>({\n      q:f.q, a:f.a,\n      open: this.state.openFaq===i,\n      iconTransform: this.state.openFaq===i ? 'rotate(45deg)' : 'rotate(0deg)',\n      onToggle: ()=>this.toggleFaq(i)\n    }));\n    return {\n      rootRef:this.rootRef,\n      navOpen:this.state.navOpen,\n      toggleNav:()=>this.toggleNav(),\n      closeNav:()=>this.closeNav(),\n      faqs,\n      prenom:this.state.prenom,\n      email:this.state.email,\n      message:this.state.message,\n      onPrenom:(e)=>this.setState({prenom:e.target.value, errPrenom:false}),\n      onEmail:(e)=>this.setState({email:e.target.value, errEmail:false}),\n      onMessage:(e)=>this.setState({message:e.target.value, errMessage:false}),\n      errPrenom:this.state.errPrenom,\n      errEmail:this.state.errEmail,\n      errMessage:this.state.errMessage,\n      submit:(e)=>this.submit(e),\n      sent:this.state.sent,\n      showForm:!this.state.sent\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
